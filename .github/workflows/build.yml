name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'            # Trigger build on tag pushes like v1.0.0
  workflow_dispatch:     # Allow manual triggering via GitHub UI

jobs:
  build-windows:
    name: Build & Package Windows x64 Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (clean install)
        # Using 'npm ci' ensures we install the exact locked dependency tree
        # Node 20 has prebuilt better-sqlite3 binaries, so host-installation is fast and stable
        run: npm ci

      - name: Build production application
        # Compiles both the React frontend and the Electron backend (main/IPC) into their respective output folders
        run: npm run build

      - name: Rebuild native C++ modules for Electron
        # CRITICAL: Rebuilds better-sqlite3 specifically targeting the target Electron version
        # specified in your package.json, preventing runtime DLL loading failures on the user's PC.
        run: npx electron-builder install-app-deps

      - name: Build Windows Installer (.exe)
        # Uses electron-builder to package the app into a professional NSIS wizard-style installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle Installer and Guides into ZIP
        # Combines the installer (.exe), UserLogin.txt, and คู่มือการติดตั้ง.txt into a single compressed .zip file
        run: |
          New-Item -ItemType Directory -Force -Path dist-zip
          Copy-Item -Path "release\*.exe" -Destination "dist-zip"
          Copy-Item -Path "UserLogin.txt" -Destination "dist-zip"
          Copy-Item -Path "คู่มือการติดตั้ง.txt" -Destination "dist-zip"
          Compress-Archive -Path "dist-zip\*" -DestinationPath "release\Make-a-Deal-POS-Windows.zip"

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Make-a-Deal-POS-Windows-Installer
          path: release/Make-a-Deal-POS-Windows.zip
          retention-days: 30

      - name: Create GitHub Release
        # If triggered by a release tag, automatically publish the installer to a new GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/Make-a-Deal-POS-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
