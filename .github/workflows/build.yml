name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'            # Trigger build on tag pushes like v1.0.0
  workflow_dispatch:     # Allow manual triggering via GitHub UI

jobs:
  build-windows:
    name: Build & Package Windows x64 Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (clean install)
        # Using 'npm ci' ensures we install the exact locked dependency tree
        # Node 20 has prebuilt better-sqlite3 binaries, so host-installation is fast and stable
        run: npm ci

      - name: Build React frontend (Vite)
        # Compiles the React + TypeScript app and outputs static files to /dist
        run: npm run build

      - name: Compile Electron backend (TypeScript)
        # Compiles the Electron main-process & IPC handlers to /dist-electron
        run: npm run build:electron

      - name: Rebuild native C++ modules for Electron
        # CRITICAL: Rebuilds better-sqlite3 specifically targeting the target Electron version
        # specified in your package.json, preventing runtime DLL loading failures on the user's PC.
        run: npx electron-builder install-app-deps

      - name: Build Windows Installer (.exe)
        # Uses electron-builder to package the app into a professional NSIS wizard-style installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Make-a-Deal-POS-Windows-Installer
          path: release/*.exe
          retention-days: 30

      - name: Create GitHub Release
        # If triggered by a release tag, automatically publish the installer to a new GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
