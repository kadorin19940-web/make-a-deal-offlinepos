name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'            # Trigger build on tag pushes like v1.0.0
  workflow_dispatch:     # Allow manual triggering via GitHub UI

jobs:
  build-windows:
    name: Build & Package Windows x64 Installers
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Rebuild native C++ modules for Electron
        run: npx electron-builder install-app-deps

      # ========================================================================
      # PHASE 1: BUILD & PACKAGE SOLO STANDARD
      # ========================================================================
      - name: Configure Build Target - Solo Standard
        run: |
          New-Item -ItemType Directory -Force -Path public
          node -e "require('fs').writeFileSync('public/build-config.json', JSON.stringify({ packageType: 'solo' }))"

      - name: Build production application (Solo)
        run: npm run build

      - name: Build Windows Installer - Solo (.exe)
        run: npx electron-builder --win --x64 -c electron-builder.solo.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle Solo Setup and Guides
        run: |
          New-Item -ItemType Directory -Force -Path dist-zip-solo
          Copy-Item -Path "release\*.exe" -Destination "dist-zip-solo"
          Copy-Item -Path "UserLogin.txt" -Destination "dist-zip-solo"
          Copy-Item -Path "คู่มือการติดตั้ง.txt" -Destination "dist-zip-solo"
          Compress-Archive -Path "dist-zip-solo\*" -DestinationPath "release\Make-a-Deal-POS-Solo-Windows.zip"

      - name: Store Solo Zip to Central Directory
        run: |
          New-Item -ItemType Directory -Force -Path dist-releases
          Copy-Item -Path "release\Make-a-Deal-POS-Solo-Windows.zip" -Destination "dist-releases"

      # ========================================================================
      # PHASE 2: SURGICAL CACHE CLEANUP
      # ========================================================================
      - name: Surgical Cache Cleanup for LAN Build
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue dist, dist-electron, release, dist-zip-solo

      # ========================================================================
      # PHASE 3: BUILD & PACKAGE LAN MULTI-STATION
      # ========================================================================
      - name: Configure Build Target - LAN Multi-Station
        run: |
          node -e "require('fs').writeFileSync('public/build-config.json', JSON.stringify({ packageType: 'lan' }))"

      - name: Build production application (LAN)
        run: npm run build

      - name: Build Windows Installer - LAN (.exe)
        run: npx electron-builder --win --x64 -c electron-builder.lan.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle LAN Setup and Guides
        run: |
          New-Item -ItemType Directory -Force -Path dist-zip-lan
          Copy-Item -Path "release\*.exe" -Destination "dist-zip-lan"
          Copy-Item -Path "UserLogin.txt" -Destination "dist-zip-lan"
          Copy-Item -Path "คู่มือการติดตั้ง.txt" -Destination "dist-zip-lan"
          Compress-Archive -Path "dist-zip-lan\*" -DestinationPath "release\Make-a-Deal-POS-LAN-Windows.zip"

      - name: Store LAN Zip to Central Directory
        run: |
          Copy-Item -Path "release\Make-a-Deal-POS-LAN-Windows.zip" -Destination "dist-releases"

      # ========================================================================
      # PHASE 4: UPLOAD & RELEASE ARTIFACTS
      # ========================================================================
      - name: Upload Solo Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Make-a-Deal-POS-Solo-Windows-Installer
          path: dist-releases/Make-a-Deal-POS-Solo-Windows.zip
          retention-days: 30

      - name: Upload LAN Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Make-a-Deal-POS-LAN-Windows-Installer
          path: dist-releases/Make-a-Deal-POS-LAN-Windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-releases/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
